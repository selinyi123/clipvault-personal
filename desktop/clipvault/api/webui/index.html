<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClipVault Personal</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>ClipVault <span class="muted">Personal</span></h1>
    <div class="head-right">
      <button id="pair-btn" class="ghost">配对设备</button>
      <div id="status" class="status"></div>
    </div>
  </header>
  <div id="pair-banner" class="pair-banner" hidden></div>

  <nav class="tabs">
    <button data-tab="history" class="active">历史</button>
    <button data-tab="quarantine">隔离区</button>
    <button data-tab="memory">词库</button>
  </nav>

  <div class="toolbar" id="clip-toolbar">
    <input id="q" type="search" placeholder="全文搜索…" autocomplete="off">
    <select id="type">
      <option value="">全部类型</option>
      <option value="text">text</option>
      <option value="url">url</option>
      <option value="code">code</option>
      <option value="command">command</option>
      <option value="error_log">error_log</option>
      <option value="prompt">prompt</option>
      <option value="path">path</option>
    </select>
  </div>

  <div class="toolbar" id="mem-toolbar" hidden>
    <input id="mem-text" type="text" placeholder="新增词条文本…" autocomplete="off">
    <select id="mem-kind">
      <option value="term">term</option>
      <option value="phrase">phrase</option>
      <option value="prompt">prompt</option>
      <option value="command">command</option>
      <option value="key_info">key_info</option>
      <option value="path">path</option>
    </select>
    <button id="mem-add">添加</button>
  </div>

  <main id="list" class="list"></main>
  <div id="empty" class="empty" hidden>没有内容</div>

  <script src="/app.js"></script>
</body>
</html>
