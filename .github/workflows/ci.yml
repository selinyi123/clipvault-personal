name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  desktop:
    name: Desktop tests
    # Windows-only node: watcher + instance_lock use ctypes.WinDLL (user32/kernel32),
    # which do not exist on Linux. Running on ubuntu fails at import collection.
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: desktop/pyproject.toml

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest -q

  android:
    name: Android tests and debug build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            android/*.gradle*
            android/**/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run Android unit tests
        run: ./gradlew :core:test :app:testDebugUnitTest --no-daemon

      - name: Compile Android instrumented QA sources
        run: ./gradlew :app:compileDebugAndroidTestKotlin --no-daemon

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
