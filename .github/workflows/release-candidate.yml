name: Release candidate dry run

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release-candidate.yml"
      - "android/**"
      - "desktop/**"
      - "installer/**"
      - "THIRD_PARTY_NOTICES.md"
      - "third_party/**"
      - "docs/ADR/0012-windows-tray-dependencies-and-lgpl-delivery.md"
      - "scripts/release_candidate_manifest.py"
      - "scripts/verify_release_manifest.py"
      - "docs/MANUAL_QA_V1_6_0.md"
      - "docs/VERSION_SYNC.md"

permissions:
  contents: read

jobs:
  windows-artifacts:
    name: Windows portable and installer candidate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: desktop/packaging/windows-release-requirements.txt

      - name: Resolve hash-locked Windows dependencies
        working-directory: desktop
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path packaging/wheelhouse | Out-Null
          python -m pip download --require-hashes --only-binary=:all: --dest packaging/wheelhouse --requirement packaging/windows-release-requirements.txt

          python -m venv .venv-build
          & .\.venv-build\Scripts\python.exe -m pip install --no-index --find-links packaging/wheelhouse --require-hashes --requirement packaging/windows-release-requirements.txt
          & .\.venv-build\Scripts\python.exe -m pip check

          python -m venv .venv-test
          & .\.venv-test\Scripts\python.exe -m pip install "pytest>=8.0"
          & .\.venv-test\Scripts\python.exe -m pip check

      - name: Export locked wheel notices
        working-directory: desktop
        shell: pwsh
        run: >
          .\packaging\Export-WheelNotices.ps1
          -Wheelhouse packaging/wheelhouse
          -Destination packaging/runtime-notices

      - name: Run Desktop regression suite
        working-directory: desktop
        shell: pwsh
        run: |
          . .\.venv-test\Scripts\Activate.ps1
          python -m pytest -q

      - name: Build portable executable
        working-directory: desktop
        run: >
          .\.venv-build\Scripts\python.exe -m PyInstaller
          --clean --noconfirm --onefile --name clipvault
          --hide-console hide-early
          --icon "$PWD/packaging/clipvault.ico"
          --hidden-import pystray._win32
          --workpath build_pyi
          --specpath packaging
          --add-data "$PWD/clipvault/store/migrations;clipvault/store/migrations"
          --add-data "$PWD/clipvault/api/webui;clipvault/api/webui"
          --add-data "$PWD/../THIRD_PARTY_NOTICES.md;."
          --add-data "$PWD/../third_party;third_party"
          --add-data "$PWD/packaging/runtime-notices;third_party/licenses"
          packaging/run_clipvault.py

      - name: Verify frozen tray and record onefile inventory
        working-directory: desktop
        shell: pwsh
        run: |
          $trayReport = @(& .\dist\clipvault.exe --self-test-tray 2>&1)
          $trayExit = $LASTEXITCODE
          $trayReport | Set-Content -LiteralPath packaging/tray-self-test.txt -Encoding UTF8
          $trayReport | ForEach-Object { Write-Host $_ }
          if ($trayExit -ne 0 -or $trayReport -notcontains "tray self-test ok") {
            throw "Frozen tray self-test failed with exit code $trayExit"
          }
          $inventory = @(
            & .\.venv-build\Scripts\pyi-archive_viewer.exe -r -l dist/clipvault.exe 2>&1
          )
          $inventoryExit = $LASTEXITCODE
          $inventory |
            Set-Content -LiteralPath packaging/clipvault-onefile-inventory.txt -Encoding UTF8
          if ($inventoryExit -ne 0 -or $inventory.Count -eq 0) {
            throw "Unable to inspect the frozen onefile executable"
          }
          $inventoryText = $inventory -join "`n"
          foreach ($requiredModule in @("pystray._win32", "PIL.Image")) {
            $requiredToken = "'" + $requiredModule + "'"
            if (-not $inventoryText.Contains($requiredToken)) {
              throw "Frozen onefile inventory is missing required module: $requiredModule"
            }
          }
          foreach ($disallowedComponent in @("libimagequant", "raqm")) {
            if (
              $inventoryText.IndexOf(
                $disallowedComponent,
                [System.StringComparison]::OrdinalIgnoreCase
              ) -ge 0
            ) {
              throw "Frozen onefile inventory contains disallowed component: $disallowedComponent"
            }
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        working-directory: installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "iscc"
          }
          & $iscc clipvault.iss

      - name: Stage Windows artifacts and checksums
        shell: pwsh
        run: |
          $version = python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("desktop/pyproject.toml").read_text())["project"]["version"])'
          Remove-Item release-candidate -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path release-candidate | Out-Null
          Copy-Item desktop/dist/clipvault.exe "release-candidate/ClipVault-Desktop-v$version-portable.exe"
          Copy-Item "installer/dist/ClipVault-Setup-v$version.exe" "release-candidate/ClipVault-Setup-v$version.exe"
          & .\desktop\packaging\Build-LgplRelinkKit.ps1 `
            -Version $version `
            -Commit "${{ github.sha }}" `
            -Wheelhouse desktop/packaging/wheelhouse `
            -RuntimeNotices desktop/packaging/runtime-notices `
            -Inventory desktop/packaging/clipvault-onefile-inventory.txt `
            -TraySelfTestReport desktop/packaging/tray-self-test.txt `
            -PythonExecutable desktop/.venv-build/Scripts/python.exe `
            -Output "release-candidate/ClipVault-v$version-LGPL-relink-kit.zip"
          python scripts/release_candidate_manifest.py --artifact-dir release-candidate --platform windows --version $version --commit "${{ github.sha }}"
          python scripts/verify_release_manifest.py --artifact-dir release-candidate --platform windows --version $version --commit "${{ github.sha }}" --expect-dry-run

      - name: Upload Windows release candidate artifacts
        uses: actions/upload-artifact@v7
        with:
          name: clipvault-windows-release-candidate
          path: release-candidate/*
          if-no-files-found: error

  android-artifacts:
    name: Android debug and unsigned release candidate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            android/*.gradle*
            android/**/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build Android candidates without release signing secrets
        run: ./gradlew :core:test :app:testDebugUnitTest :app:lintDebug :app:lintRelease :app:assembleDebug :app:assembleRelease --no-daemon

      - name: Stage Android artifacts and checksums
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)"
          rm -rf ../release-candidate
          mkdir -p ../release-candidate
          cp app/build/outputs/apk/debug/app-debug.apk "../release-candidate/ClipVault-Android-v${version}-debug.apk"
          release_apk="$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | sort | head -n 1)"
          if [[ -z "${release_apk}" ]]; then
            echo "No release APK produced under app/build/outputs/apk/release" >&2
            exit 1
          fi
          cp "${release_apk}" "../release-candidate/ClipVault-Android-v${version}-release-unsigned.apk"
          cd ..
          python scripts/release_candidate_manifest.py --artifact-dir release-candidate --platform android --version "${version}" --commit "${GITHUB_SHA}"
          python scripts/verify_release_manifest.py --artifact-dir release-candidate --platform android --version "${version}" --commit "${GITHUB_SHA}" --expect-dry-run

      - name: Upload Android release candidate artifacts
        uses: actions/upload-artifact@v7
        with:
          name: clipvault-android-release-candidate
          path: release-candidate/*
          if-no-files-found: error
