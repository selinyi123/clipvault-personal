name: Release artifact build
run-name: Release artifacts ${{ inputs.version }} from ${{ github.ref_name }} draft=${{ inputs.create_draft_release }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to prepare, for example v1.6.0"
        required: true
        default: "v1.6.0"
      create_draft_release:
        description: "Create a draft GitHub Release with the generated artifacts"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate-release-input:
    name: Validate release input
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Validate release tag
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME:-}" != "main" ]]; then
            echo "::error::Release artifact build must run from main, got ${GITHUB_REF_NAME:-unknown}"
            exit 1
          fi
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must be a release tag like v1.6.0"
            exit 1
          fi
          echo "version=${RELEASE_TAG#v}" >> "${GITHUB_OUTPUT}"

  windows-release-artifacts:
    name: Windows release artifacts
    runs-on: windows-latest
    needs: validate-release-input
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: desktop/pyproject.toml

      - name: Install packaging dependencies
        working-directory: desktop
        run: python -m pip install --upgrade pip pytest pyinstaller

      - name: Run desktop release regression tests
        working-directory: desktop
        run: python -m pytest -q

      - name: Build portable executable
        working-directory: desktop
        run: >
          python -m PyInstaller --onefile --name clipvault
          --workpath build_pyi
          --specpath packaging
          --add-data "$PWD/clipvault/store/migrations;clipvault/store/migrations"
          --add-data "$PWD/clipvault/api/webui;clipvault/api/webui"
          packaging/run_clipvault.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        working-directory: installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "iscc"
          }
          & $iscc clipvault.iss

      - name: Stage Windows release artifacts
        shell: pwsh
        run: |
          $version = "${{ needs.validate-release-input.outputs.version }}"
          $sourceVersion = python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("desktop/pyproject.toml").read_text())["project"]["version"])'
          if ($version -ne $sourceVersion) {
            throw "workflow input $version does not match desktop package version $sourceVersion"
          }
          Remove-Item release-artifacts -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Copy-Item desktop/dist/clipvault.exe "release-artifacts/ClipVault-Desktop-v$version-portable.exe"
          Copy-Item "installer/dist/ClipVault-Setup-v$version.exe" "release-artifacts/ClipVault-Setup-v$version.exe"
          python scripts/release_candidate_manifest.py --artifact-dir release-artifacts --platform windows --version $version --commit "${{ github.sha }}" --kind release
          python scripts/verify_release_manifest.py --artifact-dir release-artifacts --platform windows --version $version --commit "${{ github.sha }}"

      - name: Attest Windows release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-artifacts/*

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: clipvault-windows-release-artifacts
          path: release-artifacts/*
          if-no-files-found: error

  android-signed-release:
    name: Android signed release APK
    runs-on: ubuntu-latest
    needs: validate-release-input
    environment: release
    permissions:
      contents: read
      attestations: write
      id-token: write
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            android/*.gradle*
            android/**/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Validate release signing secrets
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          for name in ANDROID_RELEASE_KEYSTORE_B64 ANDROID_RELEASE_KEYSTORE_PASSWORD ANDROID_RELEASE_KEY_ALIAS ANDROID_RELEASE_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required GitHub secret: ${name}"
              exit 1
            fi
          done
          if [[ ! "${ANDROID_RELEASE_CERT_SHA256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::ANDROID_RELEASE_CERT_SHA256 must be exactly 64 lowercase hex characters"
            exit 1
          fi

      - name: Build signed Android release APK
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate-release-input.outputs.version }}
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          keystore=""
          trap 'rm -f "${keystore:-}"' EXIT
          version="${RELEASE_VERSION}"
          source_version="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)"
          if [[ "${version}" != "${source_version}" ]]; then
            echo "::error::workflow input ${version} does not match Android versionName ${source_version}"
            exit 1
          fi
          umask 077
          keystore="${RUNNER_TEMP}/clipvault-release.jks"
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_B64}" | base64 -d > "${keystore}"
          ./gradlew :core:test :app:testDebugUnitTest :app:lintRelease :app:assembleRelease --no-daemon \
            -PCV_KEYSTORE="${keystore}" \
            -PCV_KEYSTORE_PASS="${ANDROID_RELEASE_KEYSTORE_PASSWORD}" \
            -PCV_KEY_ALIAS="${ANDROID_RELEASE_KEY_ALIAS}" \
            -PCV_KEY_PASS="${ANDROID_RELEASE_KEY_PASSWORD}"

          rm -rf ../release-artifacts
          mkdir -p ../release-artifacts
          mapfile -t release_apks < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print | sort)
          if [[ "${#release_apks[@]}" -ne 1 ]]; then
            echo "::error::Expected exactly one release APK; found ${#release_apks[@]}"
            exit 1
          fi
          release_apk="${release_apks[0]}"
          signed_apk="../release-artifacts/ClipVault-Android-v${version}-release-signed.apk"
          cp "${release_apk}" "${signed_apk}"
          apksigner="$(find "${ANDROID_HOME}/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          if [[ -z "${apksigner}" || ! -x "${apksigner}" ]]; then
            echo "::error::No executable apksigner found under ANDROID_HOME/build-tools"
            exit 1
          fi
          "${apksigner}" verify --verbose -Werr --print-certs "${signed_apk}" | tee ../release-artifacts/ANDROID_APKSIGNER_VERIFY.txt
          cd ..
          python scripts/release_candidate_manifest.py --artifact-dir release-artifacts --platform android --version "${version}" --commit "${GITHUB_SHA}" --kind release --signed
          python scripts/verify_release_manifest.py --artifact-dir release-artifacts --platform android --version "${version}" --commit "${GITHUB_SHA}" --require-signed --expected-android-cert-sha256 "${ANDROID_RELEASE_CERT_SHA256}"

      - name: Attest Android signed release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-artifacts/*

      - name: Upload Android signed release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: clipvault-android-signed-release-artifacts
          path: release-artifacts/*
          if-no-files-found: error

  draft-github-release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    environment: release
    needs:
      - validate-release-input
      - windows-release-artifacts
      - android-signed-release
    if: ${{ inputs.create_draft_release }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Download Windows release artifacts
        uses: actions/download-artifact@v8
        with:
          name: clipvault-windows-release-artifacts
          path: release-artifacts/clipvault-windows-release-artifacts

      - name: Download Android signed release artifacts
        uses: actions/download-artifact@v8
        with:
          name: clipvault-android-signed-release-artifacts
          path: release-artifacts/clipvault-android-signed-release-artifacts

      - name: Verify downloaded release artifacts
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate-release-input.outputs.version }}
          ANDROID_RELEASE_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          python scripts/verify_release_manifest.py \
            --artifact-dir release-artifacts/clipvault-windows-release-artifacts \
            --platform windows \
            --version "${RELEASE_VERSION}" \
            --commit "${GITHUB_SHA}"
          python scripts/verify_release_manifest.py \
            --artifact-dir release-artifacts/clipvault-android-signed-release-artifacts \
            --platform android \
            --version "${RELEASE_VERSION}" \
            --commit "${GITHUB_SHA}" \
            --require-signed \
            --expected-android-cert-sha256 "${ANDROID_RELEASE_CERT_SHA256}"

      - name: Create draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Release ${RELEASE_TAG} already exists"
            exit 1
          fi
          mkdir -p upload-assets
          artifact_dirs=(
            release-artifacts/clipvault-windows-release-artifacts
            release-artifacts/clipvault-android-signed-release-artifacts
          )
          for dir in "${artifact_dirs[@]}"; do
            while IFS= read -r -d '' file; do
              parent="$(basename "$(dirname "${file}")")"
              base="$(basename "${file}")"
              asset="${base}"
              if [[ "${base}" == "SHA256SUMS.txt" || "${base}" == "RELEASE_MANIFEST.json" ]]; then
                case "${parent}" in
                  *windows*) asset="windows-${base}" ;;
                  *android*) asset="android-${base}" ;;
                  *) asset="${parent}-${base}" ;;
                esac
              fi
              if [[ -e "upload-assets/${asset}" ]]; then
                echo "::error::Duplicate release asset name after staging: ${asset}"
                exit 1
              fi
              cp "${file}" "upload-assets/${asset}"
            done < <(find "${dir}" -maxdepth 1 -type f -print0)
          done
          cat > release-notes.md <<'EOF'
          ClipVault Personal release draft.

          Do not publish this draft until Issue #36 has signed APK evidence and
          manual Android IME/privacy/sync and Windows clipboard privacy evidence.
          EOF
          files=()
          while IFS= read -r -d '' file; do
            files+=("${file}")
          done < <(find upload-assets -type f -print0)
          gh release create "${RELEASE_TAG}" "${files[@]}" \
            --draft \
            --target "${GITHUB_SHA}" \
            --title "ClipVault Personal ${RELEASE_TAG}" \
            --notes-file release-notes.md
