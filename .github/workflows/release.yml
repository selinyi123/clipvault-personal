name: Release artifact build
run-name: Release artifacts ${{ inputs.version }} from ${{ github.ref_name }} draft=${{ inputs.create_draft_release }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to prepare, for example v1.6.0"
        required: true
        default: "v1.6.0"
      create_draft_release:
        description: "Create a draft GitHub Release with the generated artifacts"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate-release-input:
    name: Validate release input
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Validate release tag
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME:-}" != "main" ]]; then
            echo "::error::Release artifact build must run from main, got ${GITHUB_REF_NAME:-unknown}"
            exit 1
          fi
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must be a release tag like v1.6.0"
            exit 1
          fi
          echo "version=${RELEASE_TAG#v}" >> "${GITHUB_OUTPUT}"

  windows-release-artifacts:
    name: Windows release artifacts
    runs-on: windows-latest
    needs: validate-release-input
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: desktop/packaging/windows-release-requirements.txt

      - name: Resolve hash-locked Windows dependencies
        working-directory: desktop
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path packaging/wheelhouse | Out-Null
          python -m pip download --require-hashes --only-binary=:all: --dest packaging/wheelhouse --requirement packaging/windows-release-requirements.txt

          python -m venv .venv-build
          & .\.venv-build\Scripts\python.exe -m pip install --no-index --find-links packaging/wheelhouse --require-hashes --requirement packaging/windows-release-requirements.txt
          & .\.venv-build\Scripts\python.exe -m pip check

          python -m venv .venv-test
          & .\.venv-test\Scripts\python.exe -m pip install "pytest>=8.0"
          & .\.venv-test\Scripts\python.exe -m pip check

      - name: Export locked wheel notices
        working-directory: desktop
        shell: pwsh
        run: >
          .\packaging\Export-WheelNotices.ps1
          -Wheelhouse packaging/wheelhouse
          -Destination packaging/runtime-notices

      - name: Run desktop release regression tests
        working-directory: desktop
        shell: pwsh
        run: |
          . .\.venv-test\Scripts\Activate.ps1
          python -m pytest -q

      - name: Build portable executable
        working-directory: desktop
        run: >
          .\.venv-build\Scripts\python.exe -m PyInstaller
          --clean --noconfirm --onefile --name clipvault
          --hide-console hide-early
          --icon "$PWD/packaging/clipvault.ico"
          --hidden-import pystray._win32
          --workpath build_pyi
          --specpath packaging
          --add-data "$PWD/clipvault/store/migrations;clipvault/store/migrations"
          --add-data "$PWD/clipvault/api/webui;clipvault/api/webui"
          --add-data "$PWD/../THIRD_PARTY_NOTICES.md;."
          --add-data "$PWD/../third_party;third_party"
          --add-data "$PWD/packaging/runtime-notices;third_party/licenses"
          packaging/run_clipvault.py

      - name: Verify frozen tray and record onefile inventory
        working-directory: desktop
        shell: pwsh
        run: |
          $trayReport = @(& .\dist\clipvault.exe --self-test-tray 2>&1)
          $trayExit = $LASTEXITCODE
          $trayReport | Set-Content -LiteralPath packaging/tray-self-test.txt -Encoding UTF8
          $trayReport | ForEach-Object { Write-Host $_ }
          if ($trayExit -ne 0 -or $trayReport -notcontains "tray self-test ok") {
            throw "Frozen tray self-test failed with exit code $trayExit"
          }
          $inventory = @(
            & .\.venv-build\Scripts\pyi-archive_viewer.exe -r -l dist/clipvault.exe 2>&1
          )
          $inventoryExit = $LASTEXITCODE
          $inventory |
            Set-Content -LiteralPath packaging/clipvault-onefile-inventory.txt -Encoding UTF8
          if ($inventoryExit -ne 0 -or $inventory.Count -eq 0) {
            throw "Unable to inspect the frozen onefile executable"
          }
          $inventoryText = $inventory -join "`n"
          foreach ($requiredModule in @("pystray._win32", "PIL.Image")) {
            $requiredToken = "'" + $requiredModule + "'"
            if (-not $inventoryText.Contains($requiredToken)) {
              throw "Frozen onefile inventory is missing required module: $requiredModule"
            }
          }
          foreach ($disallowedComponent in @("libimagequant", "raqm")) {
            if (
              $inventoryText.IndexOf(
                $disallowedComponent,
                [System.StringComparison]::OrdinalIgnoreCase
              ) -ge 0
            ) {
              throw "Frozen onefile inventory contains disallowed component: $disallowedComponent"
            }
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        working-directory: installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "iscc"
          }
          & $iscc clipvault.iss

      - name: Stage Windows release artifacts
        shell: pwsh
        run: |
          $version = "${{ needs.validate-release-input.outputs.version }}"
          $sourceVersion = python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("desktop/pyproject.toml").read_text())["project"]["version"])'
          if ($version -ne $sourceVersion) {
            throw "workflow input $version does not match desktop package version $sourceVersion"
          }
          Remove-Item release-artifacts -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Copy-Item desktop/dist/clipvault.exe "release-artifacts/ClipVault-Desktop-v$version-portable.exe"
          Copy-Item "installer/dist/ClipVault-Setup-v$version.exe" "release-artifacts/ClipVault-Setup-v$version.exe"
          & .\desktop\packaging\Build-LgplRelinkKit.ps1 `
            -Version $version `
            -Commit "${{ github.sha }}" `
            -Wheelhouse desktop/packaging/wheelhouse `
            -RuntimeNotices desktop/packaging/runtime-notices `
            -Inventory desktop/packaging/clipvault-onefile-inventory.txt `
            -TraySelfTestReport desktop/packaging/tray-self-test.txt `
            -PythonExecutable desktop/.venv-build/Scripts/python.exe `
            -Output "release-artifacts/ClipVault-v$version-LGPL-relink-kit.zip"
          python scripts/release_candidate_manifest.py --artifact-dir release-artifacts --platform windows --version $version --commit "${{ github.sha }}" --kind release
          python scripts/verify_release_manifest.py --artifact-dir release-artifacts --platform windows --version $version --commit "${{ github.sha }}"

      - name: Attest Windows release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-artifacts/*

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: clipvault-windows-release-artifacts
          path: release-artifacts/*
          if-no-files-found: error

  android-signed-release:
    name: Android signed release APK
    runs-on: ubuntu-latest
    needs: validate-release-input
    environment: release
    permissions:
      contents: read
      attestations: write
      id-token: write
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            android/*.gradle*
            android/**/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Validate release signing secrets
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          for name in ANDROID_RELEASE_KEYSTORE_B64 ANDROID_RELEASE_KEYSTORE_PASSWORD ANDROID_RELEASE_KEY_ALIAS ANDROID_RELEASE_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required GitHub secret: ${name}"
              exit 1
            fi
          done
          if [[ ! "${ANDROID_RELEASE_CERT_SHA256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::ANDROID_RELEASE_CERT_SHA256 must be exactly 64 lowercase hex characters"
            exit 1
          fi
          expected_android_release_cert_sha256="ef93502c8e5e68f1d0c8b46c36c521b84a09b11be8bc924030b5ada16d761757"
          if [[ "${ANDROID_RELEASE_CERT_SHA256}" != "${expected_android_release_cert_sha256}" ]]; then
            echo "::error::ANDROID_RELEASE_CERT_SHA256 does not match the approved v1.6.0 signing-reset certificate"
            exit 1
          fi

      - name: Build signed Android release APK
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate-release-input.outputs.version }}
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          ORG_GRADLE_PROJECT_CV_KEYSTORE_PASS: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_CV_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_CV_KEY_PASS: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          keystore=""
          trap 'rm -f -- "${keystore:-}"' EXIT
          version="${RELEASE_VERSION}"
          source_version="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)"
          if [[ "${version}" != "${source_version}" ]]; then
            echo "::error::workflow input ${version} does not match Android versionName ${source_version}"
            exit 1
          fi
          umask 077
          keystore="${RUNNER_TEMP}/clipvault-release.jks"
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_B64}" | base64 -d > "${keystore}"
          unset ANDROID_RELEASE_KEYSTORE_B64
          export ORG_GRADLE_PROJECT_CV_KEYSTORE="${keystore}"
          ./gradlew :core:test :app:testDebugUnitTest :app:lintRelease :app:assembleRelease --no-daemon
          unset ORG_GRADLE_PROJECT_CV_KEYSTORE \
            ORG_GRADLE_PROJECT_CV_KEYSTORE_PASS \
            ORG_GRADLE_PROJECT_CV_KEY_ALIAS \
            ORG_GRADLE_PROJECT_CV_KEY_PASS
          rm -f -- "${keystore}"
          keystore=""

          rm -rf ../release-artifacts
          mkdir -p ../release-artifacts
          mapfile -t release_apks < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print | sort)
          if [[ "${#release_apks[@]}" -ne 1 ]]; then
            echo "::error::Expected exactly one release APK; found ${#release_apks[@]}"
            exit 1
          fi
          release_apk="${release_apks[0]}"
          signed_apk="../release-artifacts/ClipVault-Android-v${version}-release-signed.apk"
          cp "${release_apk}" "${signed_apk}"
          aapt="$(find "${ANDROID_HOME}/build-tools" -name aapt -type f | sort -V | tail -n 1)"
          if [[ -z "${aapt}" || ! -x "${aapt}" ]]; then
            echo "::error::No executable aapt found under ANDROID_HOME/build-tools"
            exit 1
          fi
          badging_output="$("${aapt}" dump badging "${signed_apk}")"
          package_line="${badging_output%%$'\n'*}"
          if [[ "${package_line}" != "package: name='com.clipvault.app'"* ]]; then
            echo "::error::Final APK application ID is not com.clipvault.app"
            exit 1
          fi
          if [[ "${package_line}" != *" versionName='${version}'"* ]]; then
            echo "::error::Final APK manifest versionName does not match ${version}"
            exit 1
          fi
          apksigner="$(find "${ANDROID_HOME}/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          if [[ -z "${apksigner}" || ! -x "${apksigner}" ]]; then
            echo "::error::No executable apksigner found under ANDROID_HOME/build-tools"
            exit 1
          fi
          "${apksigner}" verify --verbose -Werr --print-certs "${signed_apk}" | tee ../release-artifacts/ANDROID_APKSIGNER_VERIFY.txt
          cd ..
          python scripts/release_candidate_manifest.py --artifact-dir release-artifacts --platform android --version "${version}" --commit "${GITHUB_SHA}" --kind release --signed
          python scripts/verify_release_manifest.py --artifact-dir release-artifacts --platform android --version "${version}" --commit "${GITHUB_SHA}" --require-signed --expected-android-cert-sha256 "${ANDROID_RELEASE_CERT_SHA256}"

      - name: Attest Android signed release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-artifacts/*

      - name: Upload Android signed release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: clipvault-android-signed-release-artifacts
          path: release-artifacts/*
          if-no-files-found: error

  draft-github-release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    environment: release
    needs:
      - validate-release-input
      - windows-release-artifacts
      - android-signed-release
    if: ${{ inputs.create_draft_release }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Download Windows release artifacts
        uses: actions/download-artifact@v8
        with:
          name: clipvault-windows-release-artifacts
          path: release-artifacts/clipvault-windows-release-artifacts

      - name: Download Android signed release artifacts
        uses: actions/download-artifact@v8
        with:
          name: clipvault-android-signed-release-artifacts
          path: release-artifacts/clipvault-android-signed-release-artifacts

      - name: Verify downloaded release artifacts
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate-release-input.outputs.version }}
          ANDROID_RELEASE_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          python scripts/verify_release_manifest.py \
            --artifact-dir release-artifacts/clipvault-windows-release-artifacts \
            --platform windows \
            --version "${RELEASE_VERSION}" \
            --commit "${GITHUB_SHA}"
          python scripts/verify_release_manifest.py \
            --artifact-dir release-artifacts/clipvault-android-signed-release-artifacts \
            --platform android \
            --version "${RELEASE_VERSION}" \
            --commit "${GITHUB_SHA}" \
            --require-signed \
            --expected-android-cert-sha256 "${ANDROID_RELEASE_CERT_SHA256}"

      - name: Create draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.version }}
          ANDROID_RELEASE_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Release ${RELEASE_TAG} already exists"
            exit 1
          fi
          mkdir -p upload-assets
          artifact_dirs=(
            release-artifacts/clipvault-windows-release-artifacts
            release-artifacts/clipvault-android-signed-release-artifacts
          )
          for dir in "${artifact_dirs[@]}"; do
            while IFS= read -r -d '' file; do
              parent="$(basename "$(dirname "${file}")")"
              base="$(basename "${file}")"
              asset="${base}"
              if [[ "${base}" == "SHA256SUMS.txt" || "${base}" == "RELEASE_MANIFEST.json" ]]; then
                case "${parent}" in
                  *windows*) asset="windows-${base}" ;;
                  *android*) asset="android-${base}" ;;
                  *) asset="${parent}-${base}" ;;
                esac
              fi
              if [[ -e "upload-assets/${asset}" ]]; then
                echo "::error::Duplicate release asset name after staging: ${asset}"
                exit 1
              fi
              cp "${file}" "upload-assets/${asset}"
            done < <(find "${dir}" -maxdepth 1 -type f -print0)
          done
          old_android_cert_sha256="898f21c2b59a4a4729fd386d91a86711b81ea567d5d85bf391a2e0fff2f1f9f1"
          expected_android_release_cert_sha256="ef93502c8e5e68f1d0c8b46c36c521b84a09b11be8bc924030b5ada16d761757"
          if [[ ! "${ANDROID_RELEASE_CERT_SHA256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::ANDROID_RELEASE_CERT_SHA256 must be exactly 64 lowercase hex characters"
            exit 1
          fi
          if [[ "${ANDROID_RELEASE_CERT_SHA256}" != "${expected_android_release_cert_sha256}" ]]; then
            echo "::error::Draft Release certificate does not match the approved v1.6.0 signing-reset certificate"
            exit 1
          fi
          cat > release-notes.md <<EOF
          # ClipVault Personal ${RELEASE_TAG}

          > [!WARNING]
          > **Android signing reset - this is not an in-place update from v1.5.10.**
          >
          > The ${RELEASE_TAG} APK retains application ID com.clipvault.app but uses a
          > new signing identity. Android therefore requires the installed v1.5.10
          > package to be uninstalled before this APK can be installed.
          >
          > Before uninstalling v1.5.10, synchronize and verify public clips on
          > Desktop and verify Desktop-authoritative public memory. After draining the
          > old outbox, revoke the old peer and run the documented one-time Desktop
          > reseed preparation. v1.5.10 has no supported export path for quarantined
          > Android-only secret/private items: confirm its quarantine is empty, or
          > explicitly accept their permanent loss; otherwise stop.
          > After uninstalling, install ${RELEASE_TAG} fresh, pair again, pull the
          > prepared reseed, and re-enable the ClipVault Panel IME and Quick Settings Tile.
          >
          > Old certificate SHA-256: ${old_android_cert_sha256}
          > New certificate SHA-256: ${ANDROID_RELEASE_CERT_SHA256}
          > There is no cryptographic signing continuity between these certificates.

          ## Windows tray dependency and relinking materials

          The Windows artifacts include pystray 0.19.5 under
          LGPL-3.0-or-later. The exact corresponding pystray source, ClipVault
          source, hash-locked build wheelhouse, license texts, SBOM, and practical
          relink instructions are delivered as the ninth Release asset:
          `ClipVault-${RELEASE_TAG}-LGPL-relink-kit.zip`.

          Do not publish this draft until Issue #36 has signed APK evidence and
          manual Android IME/privacy/sync and Windows clipboard privacy evidence.
          EOF
          files=()
          while IFS= read -r -d '' file; do
            files+=("${file}")
          done < <(find upload-assets -type f -print0)
          gh release create "${RELEASE_TAG}" "${files[@]}" \
            --draft \
            --target "${GITHUB_SHA}" \
            --title "ClipVault Personal ${RELEASE_TAG}" \
            --notes-file release-notes.md
